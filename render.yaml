services:
  - type: web
    name: aegis-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        fromService:
          name: aegis-portal
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: aegis-portal
    env: static
    buildCommand: cd portal && npm install && npm run build
    staticPublishPath: ./portal/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: aegis-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
